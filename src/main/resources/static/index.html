<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediBridge — Prescription Helper</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #E8E4F8 0%, #D4E8F8 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px 0;
        }
        .container {
            background-color: white;
            padding: 45px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 520px;
        }
        h1 {
            color: #2c3e8c;
            text-align: center;
            font-size: 30px;
            margin-bottom: 5px;
        }
        .subtitle {
            text-align: center;
            color: #888;
            font-size: 14px;
            margin-bottom: 5px;
        }
        .subtitle-urdu {
            text-align: center;
            color: #888;
            font-size: 14px;
            margin-bottom: 20px;
            direction: rtl;
        }
        .divider {
            text-align: center;
            color: #aaa;
            font-size: 13px;
            margin: 15px 0;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }
        label {
            display: block;
            font-weight: 600;
            color: #2c3e8c;
            margin-bottom: 3px;
            font-size: 15px;
        }
        input[type="text"] {
            width: 100%;
            padding: 13px 15px;
            margin-bottom: 20px;
            border: 2px solid #e0e7ff;
            border-radius: 10px;
            font-size: 15px;
            background-color: #f8f9ff;
            transition: border 0.3s;
        }
        input[type="text"]:focus {
            border-color: #2c3e8c;
            outline: none;
            background-color: white;
        }
        input[type="file"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 2px dashed #c0c8f0;
            border-radius: 10px;
            font-size: 14px;
            background-color: #f8f9ff;
            cursor: pointer;
        }
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #2c3e8c, #667eea);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 17px;
            cursor: pointer;
            font-weight: bold;
            letter-spacing: 0.5px;
            transition: opacity 0.3s;
            margin-bottom: 10px;
        }
        button:hover { opacity: 0.9; }
        .ocr-btn {
            background: linear-gradient(135deg, #e65100, #ff8f00);
        }
        .result {
            margin-top: 25px;
            padding: 20px;
            border-radius: 12px;
            display: none;
        }
        .result.success {
            background-color: #e8f5e9;
            border: 2px solid #4caf50;
        }
        .result.error {
            background-color: #fdecea;
            border: 2px solid #f44336;
        }
        .result.ocr-result {
            background-color: #fff8e1;
            border: 2px solid #ffc107;
        }
        .instruction {
            font-size: 17px;
            color: #2e7d32;
            font-weight: bold;
            margin-bottom: 10px;
            line-height: 1.5;
        }
        .urdu-instruction {
            font-size: 17px;
            color: #1a5276;
            font-weight: bold;
            margin-bottom: 10px;
            line-height: 1.8;
            text-align: right;
            direction: rtl;
            background-color: #EBF5FB;
            padding: 10px 12px;
            border-radius: 8px;
        }
        .disclaimer {
            font-size: 13px;
            color: #e65100;
            background-color: #fff3e0;
            padding: 10px 12px;
            border-radius: 8px;
            margin-top: 10px;
            line-height: 1.5;
        }
        .warning {
            font-size: 16px;
            color: #c62828;
            font-weight: bold;
            line-height: 1.5;
        }
        .speak-btn {
            width: 100%;
            margin-top: 15px;
            padding: 12px;
            background: #4caf50;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 0;
        }
        .speak-btn:hover { background: #388e3c; }
        .lang-label {
            font-size: 11px;
            font-weight: 600;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }
        .ocr-text {
            font-size: 14px;
            color: #5d4037;
            background-color: #fff8e1;
            padding: 10px;
            border-radius: 8px;
            line-height: 1.6;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏥 MediBridge</h1>
        <p class="subtitle">AI Prescription Helper for Everyone</p>
        <p class="subtitle-urdu">ہر کسی کے لیے نسخہ مددگار</p>

        <!-- Manual Input -->
        <label>💊 Drug Name — دوائی کا نام:</label>
        <input type="text" id="drugName" placeholder="e.g. Paracetamol" />

        <label>📏 Dose — خوراک:</label>
        <input type="text" id="dose" placeholder="e.g. 500mg — یا لکھیں: not sure" />

        <label>🕐 Frequency — کتنی بار:</label>
        <input type="text" id="frequency" placeholder="e.g. twice daily" />

        <button onclick="getPrescription()">
            Get Instructions — ہدایات حاصل کریں
        </button>

        <!-- OCR Section -->
        <div class="divider">📷 OR — یا پھر prescription کی تصویر اپلوڈ کریں</div>

        <label>📄 Upload Prescription Image — تصویر اپلوڈ کریں:</label>
        <input type="file" id="prescriptionImage" accept="image/*" />

        <button class="ocr-btn" onclick="scanPrescription()">
            📷 Scan Prescription — نسخہ اسکین کریں
        </button>

        <div class="result" id="result"></div>
        <div class="result" id="ocrResult"></div>
    </div>

    <script>
        async function getPrescription() {
            const drugName = document.getElementById('drugName').value;
            const dose = document.getElementById('dose').value;
            const frequency = document.getElementById('frequency').value;

            if (!drugName || !dose || !frequency) {
                alert('Please fill all fields! — براہ کرم تمام خانے بھریں!');
                return;
            }

            const url = `/api/parse?drugName=${drugName}&dose=${dose}&frequency=${frequency}`;
            const response = await fetch(url);
            const data = await response.json();

            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'block';

            if (data.warning) {
                resultDiv.className = 'result error';
                resultDiv.innerHTML = `
                    <div class="warning">⚠️ ${data.warning}</div>
                    <div class="disclaimer">${data.disclaimer}</div>
                `;
            } else {
                resultDiv.className = 'result success';
                resultDiv.innerHTML = `
                    <div class="lang-label">🇬🇧 English</div>
                    <div class="instruction">✅ ${data.instruction}</div>
                    <div class="lang-label" style="margin-top:10px">🇵🇰 اردو</div>
                    <div class="urdu-instruction">${data.urduInstruction}</div>
                    <div class="disclaimer">⚠️ ${data.disclaimer}</div>
                    <button class="speak-btn" id="speakBtn">
                        🔊 Listen to Instructions — سنیں
                    </button>
                `;

                document.getElementById('speakBtn').addEventListener('click', function() {
                    speechSynthesis.cancel();
                    const msg = new SpeechSynthesisUtterance(data.instruction + '. ' + data.disclaimer);
                    msg.lang = 'en-US';
                    msg.rate = 0.8;
                    speechSynthesis.speak(msg);
                });
            }
        }

        async function scanPrescription() {
            const imageFile = document.getElementById('prescriptionImage').files[0];

            if (!imageFile) {
                alert('Please select an image first! — پہلے تصویر منتخب کریں!');
                return;
            }

            const formData = new FormData();
            formData.append('image', imageFile);

            const ocrResultDiv = document.getElementById('ocrResult');
            ocrResultDiv.style.display = 'block';
            ocrResultDiv.className = 'result ocr-result';
            ocrResultDiv.innerHTML = '⏳ Scanning prescription... — نسخہ اسکین ہو رہا ہے...';

            const response = await fetch('/api/ocr', {
                method: 'POST',
                body: formData
            });

            const data = await response.json();

            if (!data.success) {
                ocrResultDiv.className = 'result error';
                ocrResultDiv.innerHTML = `
                    <div class="warning">⚠️ ${data.warning}</div>
                    <div class="disclaimer">${data.disclaimer}</div>
                `;
            } else {
                ocrResultDiv.className = 'result ocr-result';
                ocrResultDiv.innerHTML = `
                    <p style="font-weight:bold; color:#e65100; margin-bottom:8px">
                        📄 Extracted Text — نکالا گیا متن:
                    </p>
                    <div class="ocr-text">${data.extractedText}</div>
                    <div class="disclaimer" style="margin-top:10px">
                        ⚠️ ${data.message} Please verify this text and fill the form above.
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
