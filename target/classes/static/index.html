<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediBridge — Prescription Helper</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #E8E4F8 0%, #D4E8F8 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: white;
            padding: 45px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 520px;
        }
        h1 {
            color: #2c3e8c;
            text-align: center;
            font-size: 30px;
            margin-bottom: 5px;
        }
        .subtitle {
            text-align: center;
            color: #888;
            font-size: 14px;
            margin-bottom: 35px;
        }
        label {
            display: block;
            font-weight: 600;
            color: #2c3e8c;
            margin-bottom: 6px;
            font-size: 15px;
        }
        input {
            width: 100%;
            padding: 13px 15px;
            margin-bottom: 20px;
            border: 2px solid #e0e7ff;
            border-radius: 10px;
            font-size: 15px;
            background-color: #f8f9ff;
            transition: border 0.3s;
        }
        input:focus {
            border-color: #2c3e8c;
            outline: none;
            background-color: white;
        }
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #2c3e8c, #667eea);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 17px;
            cursor: pointer;
            font-weight: bold;
            letter-spacing: 0.5px;
            transition: opacity 0.3s;
        }
        button:hover { opacity: 0.9; }
        .result {
            margin-top: 25px;
            padding: 20px;
            border-radius: 12px;
            display: none;
        }
        .result.success {
            background-color: #e8f5e9;
            border: 2px solid #4caf50;
        }
        .result.error {
            background-color: #fdecea;
            border: 2px solid #f44336;
        }
        .instruction {
            font-size: 17px;
            color: #2e7d32;
            font-weight: bold;
            margin-bottom: 10px;
            line-height: 1.5;
        }
        .urdu-instruction {
            font-size: 17px;
            color: #1a5276;
            font-weight: bold;
            margin-bottom: 10px;
            line-height: 1.8;
            text-align: right;
            direction: rtl;
            background-color: #EBF5FB;
            padding: 10px 12px;
            border-radius: 8px;
        }
        .disclaimer {
            font-size: 13px;
            color: #e65100;
            background-color: #fff3e0;
            padding: 10px 12px;
            border-radius: 8px;
            margin-top: 10px;
            line-height: 1.5;
        }
        .warning {
            font-size: 16px;
            color: #c62828;
            font-weight: bold;
            line-height: 1.5;
        }
        .speak-btn {
            width: 100%;
            margin-top: 15px;
            padding: 12px;
            background: #4caf50;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            cursor: pointer;
            font-weight: bold;
        }
        .speak-btn:hover { background: #388e3c; }
        .lang-label {
            font-size: 11px;
            font-weight: 600;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏥 MediBridge</h1>
        <p class="subtitle">AI Prescription Helper for Everyone</p>

        <label>💊 Drug Name:</label>
        <input type="text" id="drugName" placeholder="e.g. Paracetamol" />

        <label>📏 Dose:</label>
        <input type="text" id="dose" placeholder="e.g. 500mg" />

        <label>🕐 Frequency:</label>
        <input type="text" id="frequency" placeholder="e.g. twice daily" />

        <button onclick="getPrescription()">Get Instructions</button>

        <div class="result" id="result"></div>
    </div>

    <script>
        async function getPrescription() {
            const drugName = document.getElementById('drugName').value;
            const dose = document.getElementById('dose').value;
            const frequency = document.getElementById('frequency').value;

            if (!drugName || !dose || !frequency) {
                alert('Please fill all fields!');
                return;
            }

            const url = `/api/parse?drugName=${drugName}&dose=${dose}&frequency=${frequency}`;
            const response = await fetch(url);
            const data = await response.json();

            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'block';

            if (data.warning) {
                resultDiv.className = 'result error';
                resultDiv.innerHTML = `
                    <div class="warning">⚠️ ${data.warning}</div>
                    <div class="disclaimer">${data.disclaimer}</div>
                `;
            } else {
                resultDiv.className = 'result success';
                resultDiv.innerHTML = `
                    <div class="lang-label">🇬🇧 English</div>
                    <div class="instruction">✅ ${data.instruction}</div>
                    <div class="lang-label" style="margin-top:10px">🇵🇰 اردو</div>
                    <div class="urdu-instruction">${data.urduInstruction}</div>
                    <div class="disclaimer">⚠️ ${data.disclaimer}</div>
                    <button class="speak-btn" id="speakBtn">
                        🔊 Listen to Instructions
                    </button>
                `;

                document.getElementById('speakBtn').addEventListener('click', function() {
                    speechSynthesis.cancel();
                    const msg = new SpeechSynthesisUtterance(data.instruction + '. ' + data.disclaimer);
                    msg.lang = 'en-US';
                    msg.rate = 0.8;
                    speechSynthesis.speak(msg);
                });
            }
        }
    </script>
</body>
</html>
